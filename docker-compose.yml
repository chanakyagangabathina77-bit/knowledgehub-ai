version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: knowledgehub-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowledgehub-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/knowledgehub
      - JWT_SECRET=KnowledgeHubSecretKey123
      - JWT_EXPIRES_IN=7d
      - GEMINI_API_KEY=YOUR_GEMINI_API_KEY
      - GEMINI_MODEL=models/gemini-2.5-flash
      - ENABLE_STARTUP_LOGS=true
      - ENABLE_HTTP_LOGS=true
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:5000/api
    container_name: knowledgehub-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
